{% extends "base.html" %}
{% block content %}
    <h2>Create New Record</h2>
    <form method="POST">
        <table>
            <tr><td>Site Identification:</td><td><input type="text" name="site"></td></tr>
            <tr><td>Area:</td><td><input type="text" name="area"></td></tr>
            <tr><td>Visit Date:</td><td><input type="text" name="date" placeholder="DD/MM/YYYY"></td></tr>
            <tr><td>Start Time:</td><td><input type="text" name="time" placeholder="HH:MM:SS AM/PM"></td></tr>
            <tr><td>Species Code:</td><td><input type="text" name="code"></td></tr>
            <tr><td>Count:</td><td><input type="text" name="count"></td></tr>
        </table>
        <br>
        <input type="submit" value="Create Record">
    </form>
    <br>
    <a href="{{ url_for('index') }}"  style="margin-left: 10px;"><button> Cancel </button></a>
{% endblock %}
